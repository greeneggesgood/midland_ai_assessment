function riskBadge(r) {
  var classes = {'Critical Risk':'b-critical','High Risk':'b-high','Medium Risk':'b-medium','Low Risk':'b-low','Minimal Risk':'b-minimal'};
  var c = classes[r] || 'b-low';
  return '<span class="badge ' + c + '">' + (r||'—') + '</span>';
}

function approvalBadge(a) {
  var classes = {'Approved':'b-approved','Rejected':'b-rejected','Pending Review':'b-pending','Under Review':'b-review'};
  var c = classes[a] || 'b-pending';
  return '<span class="badge ' + c + '">' + (a||'Pending') + '</span>';
}

function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); } catch(e) { return d; }
